name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-binaries:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/backup${EXT}" ./cmd/backup
          go build -ldflags="-s -w" -o "dist/decrypt${EXT}" ./cmd/decrypt
          go build -ldflags="-s -w" -o "dist/web${EXT}" ./cmd/web

      - name: Archive binaries
        run: |
          cd dist
          ARCHIVE="pgdrive-backup_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" backup.exe decrypt.exe web.exe
          else
            tar czf "${ARCHIVE}.tar.gz" backup decrypt web
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pgdrive-backup_*
